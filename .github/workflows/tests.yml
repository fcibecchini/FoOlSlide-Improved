name: Tests

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  unit-and-e2e:
    name: Unit + E2E Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run unit + e2e smoke tests
        run: ./scripts/run-tests.sh --with-e2e
